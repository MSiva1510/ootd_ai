name: ootd_ai
description: A sophisticated OOTD (Outfit Of The Day) AI Flutter application with clean architecture.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  # or use: riverpod: ^2.0.0
  # or use: bloc: ^8.0.0

  # API & HTTP
  http: ^1.1.0
  dio: ^5.3.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Date & Time
  intl: ^0.20.2

  # Image Handling
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0

  # Analytics & Logging
  firebase_core: ^4.10.0
  firebase_analytics: ^12.4.2
  firebase_crashlytics: ^5.2.3

  # Environment Configuration
  flutter_dotenv: ^6.0.1

  # Google Services
  google_sign_in: ^7.2.0

  # Animations
  animations: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Testing
  mockito: ^5.4.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/data/
    - .env

